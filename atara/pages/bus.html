<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATARA - Bus Tracker | Real Road Lines</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="scanline"></div>
<nav class="nav">
  <div class="nav-logo">[ATARA]</div>
  <div class="nav-links">
    <a href="../../index.html" class="nav-link">HOME</a>
    <a href="bus.html" class="nav-link active">BUS TRACKER</a>
    <a href="train.html" class="nav-link">TRAIN</a>
    <a href="smartcard.html" class="nav-link">SMART CARD</a>
  </div>
  <div class="nav-time" id="navTime">--:--:--</div>
</nav>

<div class="page-layout">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">BUS LINES</div>
      <div class="panel-sub">REAL ROAD NETWORK</div>
    </div>
    <div id="serviceStatus" style="padding:0.8rem;background:#1a0000;color:#ffaa00;font-size:11px;text-align:center">CHECKING SERVICE...</div>
    <div id="routeList" style="padding:0.5rem 0"></div>
    
    <div class="panel-header">
      <div class="panel-title">SMART ETA</div>
      <div class="panel-sub">TRAFFIC ADJUSTED</div>
    </div>
    <div id="etaPanel" style="padding:1rem;font-size:11px;color:#888">SELECT A BUS LINE</div>
  </div>
  
  <div class="panel map-panel" style="position:relative">
    <div class="map-overlay" id="mapStatus">LOADING MAP...</div>
    <div id="busMap"></div>
  </div>
  
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">STATION LIST</div>
      <div class="panel-sub">KAMEZ TO QENDER</div>
    </div>
    <div id="stationList" style="padding:0.5rem 0"></div>
    
    <div class="panel-header">
      <div class="panel-title">ARRIVAL TIMES</div>
      <div class="panel-sub" id="selectedLine">SELECT A LINE</div>
    </div>
    <div id="arrivalsList" style="padding:0.5rem 0"></div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
let map, busMarkers = {}, roadLine;

// Update clock
setInterval(() => {
  document.getElementById('navTime').textContent = new Date().toTimeString().slice(0,8);
  updateServiceStatus();
}, 1000);

function updateServiceStatus() {
  const status = getServiceStatus();
  const statusDiv = document.getElementById('serviceStatus');
  if (status.active) {
    statusDiv.innerHTML = 'SERVICE ACTIVE ' + new Date().toTimeString().slice(0,5);
    statusDiv.style.background = '#001a00';
    statusDiv.style.color = '#00ff41';
  } else {
    statusDiv.innerHTML = 'NO SERVICE - NIGHT HOURS (00:00 - 05:00)';
    statusDiv.style.background = '#1a0000';
    statusDiv.style.color = '#ff3333';
  }
}

// Initialize map
function initMap() {
  map = L.map('busMap').setView([41.35, 19.81], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap',
    maxZoom: 18
  }).addTo(map);
  
  // Draw REAL ROAD LINE connecting all stations
  const roadCoordinates = [
    [41.3812, 19.7721],  // KAMEZ
    [41.3520, 19.8010],  // TEUTA
    [41.3650, 19.8120],  // PASKUGAN
    [41.3380, 19.8280],  // SHIRAZ
    [41.3420, 19.8410],  // SUKO
    [41.3368, 19.8200],  // STACION
    [41.3275, 19.8189]   // QENDER
  ];
  
  roadLine = L.polyline(roadCoordinates, {
    color: '#00ff41',
    weight: 4,
    opacity: 0.9,
    dashArray: '10, 10'
  }).addTo(map);
  
  // Add markers for each station
  Object.values(ATARA_STATIONS).forEach(station => {
    const icon = L.divIcon({
      html: `<div style="background:#fff;width:10px;height:10px;border:2px solid #000;transform:rotate(45deg)"></div>`,
      iconSize: [10, 10],
      iconAnchor: [5, 5]
    });
    L.marker([station.lat, station.lon], {icon})
      .addTo(map)
      .bindPopup(`<b>${station.name}</b><br>Zone: ${station.zone}`);
  });
  
  // Add bus marker
  const bus = ATARA_BUS_LINES[0].buses[0];
  const busIcon = L.divIcon({
    html: `<div style="background:#00ff41;color:#000;font-family:'Bebas Neue';font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:2px solid #000;box-shadow:0 0 8px #00ff41">1</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
  const marker = L.marker([bus.lat, bus.lon], {icon: busIcon}).addTo(map);
  busMarkers[bus.id] = {marker, bus, line: ATARA_BUS_LINES[0]};
  simulateBusMovement(bus, ATARA_BUS_LINES[0]);
  
  // Animate bus
  setInterval(() => {
    Object.values(busMarkers).forEach(({marker, bus}) => {
      marker.setLatLng([bus.lat, bus.lon]);
    });
    const status = getServiceStatus();
    document.getElementById('mapStatus').innerHTML = status.active ? `GPS ACTIVE - ${new Date().toTimeString().slice(0,8)}` : 'NO SERVICE - NIGHT HOURS';
    updateETAs();
  }, 1000);
  
  // Display station list
  const stationContainer = document.getElementById('stationList');
  Object.values(ATARA_STATIONS).sort((a,b) => a.order - b.order).forEach(station => {
    stationContainer.innerHTML += `
      <div class="stop-detail">
        <span>${station.order}. ${station.name}</span>
        <span style="color:#00ff41">${station.zone}</span>
      </div>
    `;
  });
}

function updateETAs() {
  const bus = ATARA_BUS_LINES[0].buses[0];
  const status = getServiceStatus();
  const etaPanel = document.getElementById('etaPanel');
  const arrivalsContainer = document.getElementById('arrivalsList');
  
  if (!status.active) {
    etaPanel.innerHTML = '<div style="color:#ff3333">NO SERVICE AT NIGHT</div>';
    arrivalsContainer.innerHTML = '<div style="padding:1rem;color:#ff3333;text-align:center">SERVICE RESUMES AT 05:00</div>';
    return;
  }
  
  const { etas, currentStation } = calculateAllETAs(bus.lat, bus.lon, ATARA_BUS_LINES[0].stations, ATARA_BUS_LINES[0].baseSpeed);
  
  // Update ETA panel
  etaPanel.innerHTML = `
    <div style="color:#00ff41;margin-bottom:8px">LINE 1 - KAMEZ TO QENDER</div>
    <div class="stop-detail"><span>CURRENT POSITION</span><span>${ATARA_STATIONS[currentStation]?.name || 'IN TRANSIT'}</span></div>
    <div class="stop-detail"><span>SPEED</span><span>${bus.speed} km/h</span></div>
    <div class="stop-detail"><span>TRAFFIC FACTOR</span><span>${getTrafficFactor()?.toFixed(1) || 'N/A'}x</span></div>
    ${etas[0] ? `<div style="margin-top:10px;padding:8px;background:#111;border:1px solid #00ff41"><span>NEXT STOP ETA</span><span style="color:#00ff41;font-size:1.3rem;margin-left:10px">${etas[0].etaMinutes} MIN</span></div>` : ''}
  `;
  
  // Update arrivals list with ETAs
  arrivalsContainer.innerHTML = '<div class="stop-detail"><span>STATION</span><span>ETA</span></div>';
  etas.forEach(eta => {
    arrivalsContainer.innerHTML += `
      <div class="stop-detail">
        <span>${eta.station.name}</span>
        <span style="color:#00ff41">${eta.etaMinutes} min</span>
      </div>
    `;
  });
  
  if (etas.length === 0) {
    arrivalsContainer.innerHTML += '<div style="padding:1rem;color:#888;text-align:center">ARRIVED AT DESTINATION</div>';
  }
}

function renderRoutes() {
  const container = document.getElementById('routeList');
  container.innerHTML = '<div class="route-item" onclick="map.setView([41.35,19.81],11);roadLine.setStyle({color:\'#00ff41\'})"><div class="route-badge">1</div><div class="route-info"><div class="route-name">KAMEZ TO QENDER</div><div style="font-size:10px;color:#666">7 stations · 12.5 km</div></div></div>';
}

// Initialize everything
setTimeout(() => {
  initMap();
  renderRoutes();
  setInterval(updateETAs, 3000);
}, 500);
</script>
</body>
</html>
